# ============================================================
# 量化交易系统 - 小资金散户配置（趋势跟踪 + 网格交易）
# ============================================================

system:
  name: "CryptoQuant Engine"
  version: "2.0.0"
  mode: "paper"                     # paper / live / backtest
  log_level: "INFO"
  timezone: "UTC"

# ============================================================
# 交易所连接
# ============================================================
exchange:
  name: "binance"
  api_key: "${BINANCE_API_KEY:dummy_key}"
  api_secret: "${BINANCE_API_SECRET:dummy_secret}"
  testnet: false
  base_url_live: "https://api.binance.com"
  base_url_test: "https://testnet.binance.vision"
  ws_url_live: "wss://stream.binance.com:9443/ws"
  ws_url_test: "wss://testnet.binance.vision/ws"

  # ---- 代理配置（Clash 切换到日本/新加坡节点）----
  proxy: "http://127.0.0.1:7890"

  base_url_alternatives:
    - "https://api1.binance.com"
    - "https://api2.binance.com"
    - "https://api3.binance.com"
    - "https://api4.binance.com"

  rate_limit:
    requests_per_minute: 1200
    orders_per_second: 10
    orders_per_day: 200000
  retry:
    max_retries: 3
    backoff_factor: 0.5
    retry_on_status: [429, 500, 502, 503]
  timeout:
    connect: 15
    read: 30
  websocket:
    ping_interval_seconds: 20
    ping_timeout_seconds: 10
    reconnect_delay_init: 1.0
    reconnect_delay_max: 60.0
    kline_intervals: ["1m", "1h"]
    orderbook_enabled: true

# ============================================================
# 交易标的 — 只做 BTC + ETH（小资金最优选择）
# ============================================================
universe:
  quote_currency: "USDT"
  symbols:
    - symbol: "BTCUSDT"
      min_qty: 0.00001
      qty_precision: 5
      price_precision: 2
      min_notional: 10.0
    - symbol: "ETHUSDT"
      min_qty: 0.0001
      qty_precision: 4
      price_precision: 2
      min_notional: 10.0

# ============================================================
# 数据配置
# ============================================================
data:
  database:
    path: "data/quant.db"
    wal_mode: true
    cache_size_mb: 256
    busy_timeout_ms: 5000
  
  history:
    lookback_days: 2000
    # 与各 timeframe retention 对齐；自 2021-01-01 起约需 1927 天（至 2026-04），2000 留余量
    timeframes:
      - interval: "1m"
        retention_days: 2000
        batch_size: 1000
      - interval: "5m"
        retention_days: 2000
        batch_size: 1000
      - interval: "15m"
        retention_days: 2000
        batch_size: 1000
      - interval: "1h"
        retention_days: 2000
        batch_size: 1000
      - interval: "4h"
        retention_days: 2000
        batch_size: 1000
      - interval: "1d"
        retention_days: 2000
        batch_size: 1000
    update_intervals:
      "1m": 60
      "5m": 300
      "15m": 900
      "1h": 3600
      "4h": 14400
      "1d": 86400
  
  orderbook:
    enabled: true
    depth: 20
    snapshot_interval_ms: 1000

# ============================================================
# 因子与特征工程
# ============================================================
features:
  lookback_windows: [5, 10, 20, 60, 120, 240, 480]
  factor_groups:
    momentum: true
    mean_reversion: true
    volatility: true
    volume: true
    microstructure: true
    cross_sectional: false    # 只有 2 个标的，截面因子无意义
    regime: true
  neutralize:
    market_beta: false        # 小资金不做中性化
    sector: false

# ============================================================
# Alpha 模型（暂保留，后续第三阶段再启用 ML）
# ============================================================
alpha:
  ml:
    model_type: "gradient_boosting"
    target: "forward_return_1h"
    target_periods: [1, 4, 24]
    train:
      train_window_days: 180
      validation_window_days: 30
      retrain_interval_hours: 24
      purge_gap_hours: 6
      embargo_hours: 3
      n_splits: 5
    params:
      gradient_boosting:
        n_estimators: 500
        max_depth: 5
        learning_rate: 0.05
        subsample: 0.8
        min_samples_leaf: 50
        max_features: 0.7
      random_forest:
        n_estimators: 300
        max_depth: 8
        min_samples_leaf: 30
        max_features: "sqrt"
    feature_selection:
      method: "importance"
      max_features: 50
      min_importance: 0.001
    signal_threshold:
      buy: 0.55
      sell: 0.55
      strong_buy: 0.65
      strong_sell: 0.65

  ensemble:
    method: "weighted_vote"
    weights:
      ml_signal: 0.5
      momentum_signal: 0.2
      mean_reversion_signal: 0.15
      regime_signal: 0.15

# ============================================================
# 组合优化
# ============================================================
portfolio:
  optimization:
    method: "equal_weight"          # 只有两个标的，等权即可
    rebalance_interval_hours: 4
  constraints:
    max_weight_per_asset: 0.60      # 单标的最大 60%
    min_weight_per_asset: 0.0
    max_turnover_daily: 2.0
    target_volatility: 0.15

# ============================================================
# 执行引擎
# ============================================================
execution:
  algo: "market"                    # 小资金直接市价单，不需要 TWAP
  twap:
    total_slices: 5
    interval_seconds: 60
    max_deviation_pct: 0.002
  vwap:
    participation_rate: 0.1
    lookback_bars: 20
  iceberg:
    show_qty_pct: 0.2
    random_factor: 0.3
  slippage:
    model: "fixed"                  # 小资金滑点固定
    base_bps: 3                     # 3bps
    impact_coefficient: 0.1
  commission:
    maker_rate: 0.001               # Maker 0.1%（普通用户费率）
    taker_rate: 0.001               # Taker 0.1%
    use_bnb_discount: true

# ============================================================
# 风控体系
# ============================================================
risk:
  pre_trade:
    max_single_order_notional: 5000
    max_single_order_pct: 0.30      # 小资金允许更大单笔（30%）
    min_order_interval_seconds: 5
    max_orders_per_minute: 10
    max_orders_per_hour: 60
    price_deviation_limit_pct: 0.02
  position:
    max_position_pct: 0.60          # 单标的最大 60%
    max_total_exposure_pct: 0.90    # 总敞口 90%
    max_concentration: 0.70
    stop_loss_pct: 0.05             # 止损 5%（宽一点，配合趋势策略）
    trailing_stop_pct: 0.08
    take_profit_pct: 0.15           # 止盈 15%
    max_holding_hours: 336          # 最长持仓 14 天
  portfolio:
    max_daily_loss_pct: 0.05
    max_weekly_loss_pct: 0.08
    max_drawdown_pct: 0.15
    max_daily_turnover: 3.0
    max_correlation_between_positions: 0.9   # BTC/ETH 相关性本来就高
    var_limit_pct: 0.08
    var_confidence: 0.95
    var_horizon_hours: 24
  circuit_breaker:
    daily_loss_trigger_pct: 0.06
    drawdown_trigger_pct: 0.18
    consecutive_losses: 7
    cooldown_hours: 8
    auto_liquidate: false

# ============================================================
# 监控告警
# ============================================================
monitoring:
  heartbeat_seconds: 30
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    min_level: "WARNING"
  metrics:
    enabled: true
    report_interval_seconds: 60
  alerts:
    - name: "high_drawdown"
      condition: "drawdown_pct > 0.10"
      level: "WARNING"
    - name: "extreme_drawdown"
      condition: "drawdown_pct > 0.15"
      level: "CRITICAL"
    - name: "position_limit_breach"
      condition: "max_position_pct > 0.65"
      level: "WARNING"
    - name: "api_latency_high"
      condition: "api_latency_ms > 2000"
      level: "WARNING"
