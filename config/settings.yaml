# ============================================================
# Trader v2.3 配置文件
#
# v2.2 → v2.3 变更:
#   - 删除 universe.intervals 中的 "1h" (全部亏损, 成本不可战胜)
#   - 删除 strategy.regime 整段 (0 trades, 策略失效)
#   - 修正 execution.slippage_bps (10 → 21/26, 基于 phase1 实测)
#   - 新增 strategy.mean_reversion.trend_avoidance
#   - 删除 MACD/TripleEMA v2.2 的过度拉伸过滤参数
#   - triple_ema 降级为 enabled=false (样本不足)
# ============================================================

universe:
  quote_currency: "USDT"
  symbols:
    - symbol: "BTCUSDT"
      min_qty: 0.00001
      qty_precision: 5
      price_precision: 2
      min_notional: 10.0
    - symbol: "ETHUSDT"
      min_qty: 0.0001
      qty_precision: 4
      price_precision: 2
      min_notional: 10.0
    # SOL/BNB 已删除: v2.2 扩标的实验未经底层 edge 验证即引入
    # 如需恢复, 必须先跑通路线 A 横截面 MVP 再考虑

  intervals:
    - "4h"
    - "1d"
    # "1h" 已删除: wf_mean_reversion_1h PnL -3015, wf_macd_1h PnL -790
    #              在 42+ bps 双边成本下不可能有正 edge

  history_days: 1825   # 5 年

# ============================================================
# 特征工程
# ============================================================
features:
  lookback_windows:
    - 5
    - 10
    - 20
    - 60
    - 120
    - 240
    - 480
  indicators:
    - macd
    - rsi
    - adx
    - atr
    - natr
    - ema
    - bollinger_bands

# ============================================================
# 策略配置
# ============================================================
strategy:
  # ---- 规则策略 (v2.3 回滚 + 改进) ----
  macd_momentum:
    enabled: true
    min_adx: 20.0
    stop_atr_mult: 2.0
    trail_atr_mult: 2.8
    risk_per_trade: 0.02
    cooldown_bars: 3
    # 已删除 (v2.2 → v2.3):
    #   min_rsi, max_rsi            - sensitivity good_ratio=0
    #   max_holding_bars            - sensitivity good_ratio=0
    #   zscore / ma_dev / keltner 过滤器 - 三层过度拉伸过滤, 过拟合

  triple_ema:
    enabled: false   # 样本不足 (11 trades/33 folds), 降级为候选
    ema_short: 20
    ema_medium: 50
    ema_long: 200
    min_adx: 20.0
    stop_atr_mult: 1.8
    trail_atr_mult: 2.8
    risk_per_trade: 0.02
    cooldown_bars: 3

  mean_reversion:
    enabled: true
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    stop_atr_mult: 2.0
    target_pct: 0.03
    max_holding_bars: 24
    risk_per_trade: 0.015
    cooldown_bars: 2
    # ---- v2.3 新增: 趋势回避门 ----
    trend_avoidance:
      max_adx_for_entry: 28.0
      monotonic_lookback: 20
      max_monotonic_ratio: 0.85

  # ---- 路线 A: 横截面因子模型 (MVP 实验) ----
  cross_sectional_momentum:
    enabled: false   # 独立入口, 不进常规 walkforward
    top_n: 50
    momentum_window: 30
    reversal_window: 7
    volatility_window: 30
    liquidity_window: 30
    long_pct: 0.20
    short_pct: 0.20
    rebalance_freq_days: 7
    use_inverse_vol_weight: true
    vol_target_annual: 0.20
    factor_weights:
      momentum_30d: 1.0
      reversal_7d: -0.3
      volatility_30d: -0.5
      liquidity_amihud: -0.3
      size_proxy: 0.3

  # ---- 已删除的策略 ----
  # regime:
  #   v2.2 实测 0 trades / 33 folds, 过滤器叠加导致完全不入场, 策略失效
  #   文件 alpha/regime_adaptive_strategy.py 已归档到 archive/v22_deprecated/

# ============================================================
# 执行 / 成本 (v2.3 修正)
# ============================================================
execution:
  slippage_bps:
    BTCUSDT: 21      # phase1 实测: 20.89 bps (v2.2 假设 10, 系统性低估)
    ETHUSDT: 26      # phase1 实测: 25.81 bps
    default: 25      # 其他标的保守估计
  commission_bps: 10    # 币安现货 VIP0 吃单

# ============================================================
# Walk-Forward 验证参数
# ============================================================
walkforward:
  train_days: 360
  test_days: 60
  purge_days: 2         # v2.3 新增: Purged WF 的 embargo (López de Prado)
  min_trades_per_fold: 3

# ============================================================
# ML 模块 (可选)
# ============================================================
ml:
  enabled: false        # MVP 阶段不用 ML 过滤
  model: "lightgbm"
  forward_bars: 6
  min_probability: 0.55

# ============================================================
# 日志
# ============================================================
logging:
  level: "INFO"
  file: "logs/trader.log"
