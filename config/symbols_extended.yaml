# 替换原有的 universe 部分:
universe:
  quote_currency: "USDT"
  symbols:
    # ---- 原有标的 ----
    - symbol: "BTCUSDT"
      min_qty: 0.00001
      qty_precision: 5
      price_precision: 2
      min_notional: 10.0

    - symbol: "ETHUSDT"
      min_qty: 0.0001
      qty_precision: 4
      price_precision: 2
      min_notional: 10.0

    # ---- P5: 新增标的 ----
    - symbol: "SOLUSDT"
      min_qty: 0.01
      qty_precision: 2
      price_precision: 2
      min_notional: 10.0

    - symbol: "BNBUSDT"
      min_qty: 0.001
      qty_precision: 3
      price_precision: 2
      min_notional: 10.0

    # 可选: 二线主流
    # - symbol: "AVAXUSDT"
    #   min_qty: 0.01
    #   qty_precision: 2
    #   price_precision: 2
    #   min_notional: 10.0
    #
    # - symbol: "LINKUSDT"
    #   min_qty: 0.01
    #   qty_precision: 2
    #   price_precision: 2
    #   min_notional: 10.0

